services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cctv_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cctv_monitoring}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cctv_admin} -d ${POSTGRES_DB:-cctv_monitoring}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8001"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ../data/snapshots:/app/data/snapshots
      - ./backups:/app/backups

  telegram-bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    command: python -m cctv_monitor.telegram.main
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      INTERNAL_API_BASE_URL: http://backend:8001

  caddy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.caddy
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
